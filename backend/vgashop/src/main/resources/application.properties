spring.application.name=vgashop

# PostgreSQL - Cấu hình do máy chủ gốc dùng PGSQL
spring.datasource.url=jdbc:postgresql://localhost:5432/vga_store?useUnicode=true&characterEncoding=UTF-8
spring.datasource.username=postgres
spring.datasource.password=3007

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.properties.hibernate.connection.characterEncoding=UTF-8
spring.jpa.properties.hibernate.connection.useUnicode=true

# Thư mục lưu ảnh (tương đối so với gốc project)
app.upload.dir=uploads/products

# Cho phép truy cập ảnh tĩnh qua URL /uploads/...
spring.mvc.static-path-pattern=/uploads/**

# JWT
app.jwt.secret=VGAStore2024SecretKeyForJWTTokenGenerationMustBe256BitsLong!
app.jwt.expiration=86400000

# Security
spring.security.user.name=admin
spring.security.user.password=admin123
spring.security.user.roles=ADMIN

# JWT Secret (Có thể thay đổi thành giá trị mạnh hơn và để ở file cấu hình riêng hoặc biến môi trường trong thực tế)
jwt.secret=vga-shop-secret-key-2026-very-strong-and-long-enough-for-hmac

# CORS
app.cors.allowed-origins=http://localhost:5173

# Server charset
server.servlet.encoding.charset=UTF-8
server.servlet.encoding.force=true
