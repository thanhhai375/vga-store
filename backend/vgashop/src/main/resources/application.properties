spring.application.name=vgashop

# PostgreSQL - Force UTF-8 encoding for Vietnamese text
spring.datasource.url=jdbc:postgresql://localhost:5432/vga_store?useUnicode=true&characterEncoding=UTF-8
spring.datasource.username=postgres
spring.datasource.password=3007

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.properties.hibernate.connection.characterEncoding=UTF-8
spring.jpa.properties.hibernate.connection.useUnicode=true

# JWT
app.jwt.secret=VGAStore2024SecretKeyForJWTTokenGenerationMustBe256BitsLong!
app.jwt.expiration=86400000

# CORS
app.cors.allowed-origins=http://localhost:5173

# Server charset
server.servlet.encoding.charset=UTF-8
server.servlet.encoding.force=true